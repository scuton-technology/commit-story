<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Git branch icon - stylized -->
  <g transform="translate(256,256)" fill="none" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main vertical line (trunk) -->
    <line x1="0" y1="-140" x2="0" y2="140"/>
    <!-- Branch line going right -->
    <path d="M0,-20 C60,-20 100,-90 100,-90"/>
    <!-- Bottom node -->
    <circle cx="0" cy="140" r="36" fill="white" stroke="none"/>
    <!-- Middle node -->
    <circle cx="0" cy="-20" r="28" fill="#2563eb" stroke="white" stroke-width="24"/>
    <!-- Top node -->
    <circle cx="0" cy="-140" r="36" fill="white" stroke="none"/>
    <!-- Branch tip node -->
    <circle cx="100" cy="-90" r="32" fill="white" stroke="none"/>
  </g>
</svg>
